<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuyển Dụng</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.hero{
background:#0057ff;
color:white;
padding:80px 20px;
text-align:center;
}

.jobs{
padding:40px 20px;
}

.card{
background:white;
padding:20px;
margin:10px 0;
border-radius:10px;
}

.form{
padding:40px 20px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:15px;
}

button{
background:#0057ff;
color:white;
border:none;
padding:15px;
width:100%;
}
</style>

</head>
<body>

<section class="hero">
<h1>TUYỂN DỤNG NHÂN SỰ</h1>
<p>Môi trường chuyên nghiệp - Thu nhập hấp dẫn</p>
</section>

<section class="jobs">
<h2>Vị trí tuyển dụng</h2>

<div class="card">Điều dưỡng</div>
<div class="card">CSKH</div>
<div class="card">Kế toán</div>
<div class="card">Lễ tân</div>

</section>

<section class="form">

<h2>Ứng tuyển ngay</h2>

<input type="text" placeholder="Họ và tên">

<input type="text" placeholder="Số điện thoại">

<select>
<option>Điều dưỡng</option>
<option>CSKH</option>
<option>Kế toán</option>
<option>Lễ tân</option>
</select>

<button>GỬI HỒ SƠ</button>

</section>

</body>
</html>
