<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VNVC Tuyển Dụng</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f3f5f9;
}

.header{
    background:#003399;
    color:white;
    text-align:center;
    padding:40px 20px;
}

.header h1{
    margin:0;
    font-size:35px;
}

.header p{
    margin-top:10px;
}

.container{
    width:90%;
    max-width:850px;
    margin:auto;
    background:white;
    margin-top:25px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    color:#003399;
    margin-top:30px;
}

label{
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:13px;
    margin-top:8px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.checkbox-group{
    margin-top:10px;
}

.checkbox-group label{
    display:block;
    margin-bottom:10px;
    font-weight:normal;
}

button{
    width:100%;
    padding:15px;
    background:#003399;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#001f66;
}

.footer{
    text-align:center;
    padding:20px;
    color:#666;
}

</style>

</head>
<body>

<div class="header">
    <h1>VNVC TUYỂN DỤNG</h1>
    <p>Gia nhập hệ thống tiêm chủng hàng đầu Việt Nam</p>
</div>

<div class="container">

<h2>THÔNG TIN CÁ NHÂN</h2>

<label>Họ và tên</label>
<input type="text" placeholder="Nhập họ tên">

<label>Ngày sinh</label>
<input type="date">

<label>Giới tính</label>
<select>
<option>Nam</option>
<option>Nữ</option>
<option>Khác</option>
</select>

<label>Số điện thoại</label>
<input type="text" placeholder="Nhập số điện thoại">

<label>Email</label>
<input type="email" placeholder="Nhập email">

<label>Địa chỉ hiện tại</label>
<textarea rows="3" placeholder="Nhập địa chỉ"></textarea>

<h2>THÔNG TIN ỨNG TUYỂN</h2>

<label>Khu vực ứng tuyển</label>
<select>
<option>Hà Nội</option>
<option>TP Hồ Chí Minh</option>
<option>Đà Nẵng</option>
<option>Cần Thơ</option>
<option>Vũng Tàu</option>
</select>

<label>Vị trí ứng tuyển</label>

<div class="checkbox-group">
<label><input type="checkbox"> Điều dưỡng</label>
<label><input type="checkbox"> Lễ tân</label>
<label><input type="checkbox"> Thu ngân</label>
<label><input type="checkbox"> Tư vấn bán hàng</label>
<label><input type="checkbox"> Chăm sóc khách hàng</label>
<label><input type="checkbox"> Nhân viên hành chính</label>
<label><input type="checkbox"> Nhân viên kho vaccine</label>
<label><input type="checkbox"> Tổng đài viên</label>
</div>

<label>Kinh nghiệm làm việc</label>
<textarea rows="5" placeholder="Mô tả kinh nghiệm làm việc"></textarea>

<label>Trình độ học vấn</label>
<select>
<option>THPT</option>
<option>Trung cấp</option>
<option>Cao đẳng</option>
<option>Đại học</option>
<option>Sau đại học</option>
</select>

<label>Tải CV / Hồ sơ</label>
<input type="file">

<label>Giới thiệu bản thân</label>
<textarea rows="6" placeholder="Viết vài dòng giới thiệu"></textarea>

<button>GỬI HỒ SƠ ỨNG TUYỂN</button>

</div>

<div class="footer">
© 2026 VNVC Recruitment
</div>

</body>
</html>
